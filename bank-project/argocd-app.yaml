apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stanley-bank-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Stanleyoluebube/stanley-bank-k8s
    targetRevision: HEAD
    path: bank-project
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
