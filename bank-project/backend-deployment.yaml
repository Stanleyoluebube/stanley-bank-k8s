apiVersion: apps/v1
kind: Deployment
metadata:
  name: stanley-bank-server
  namespace: default
  labels:
    app: stanley-bank-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stanley-bank-server
  template:
    metadata:
      labels:
        app: stanley-bank-server
    spec:
      containers:
        - name: stanley-bank-server
          # Image is updated automatically by the backend CI workflow.
          image: 178220402760.dkr.ecr.us-east-2.amazonaws.com/stanleybank/server:2f8b5fce59fb2e32a9705cf226cd3f2424731956
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: port
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: db-name
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
