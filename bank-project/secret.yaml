# K8s Secret for backend DB credentials.
# Populated by the operator after the first `terraform apply` succeeds.
# The values are read from `terraform output`:
#   - host     = aws_db_instance.stanley_bank_db.address
#   - username = var.db_username (default: stanleyadmin)
#   - port     = 5432
#
# To populate, run from the cluster context (or via ArgoCD):
#   kubectl create secret generic db-secrets \
#     --from-literal=username=stanleyadmin \
#     --from-literal=password=Stanley600 \
#     --from-literal=host=<output of `terraform output rds_endpoint`> \
#     --from-literal=port=5432 \
#     --namespace=default
#
# This manifest is kept as a placeholder reference; do not apply as-is
# because the real values must be injected from Terraform outputs.
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: default
type: Opaque
stringData:
  username: "stanleyadmin"
  password: "Stanley600"
  host: "stanley-bank-db.cdo64eyk6g6x.us-east-2.rds.amazonaws.com"
  port: "5432"
